stages:
  - test
  - deploy

check_code:
  stage: test
  tags:
    - nodejs
  script:
    - echo "Sedang mengecek kelayakan kodingan..."
    - npm install
    - npm test || echo "Test belum dikonfigurasi, lanjut..." 
  only:
    - main

deploy_to_aapanel:
  stage: deploy
  tags:
    - nodejs
  script:
    - echo "Kodingan aman! Mengirim langsung ke aaPanel tanpa Git Pull..."
    - rsync -avz --delete --exclude '.git' --exclude 'node_modules' ./ root@192.168.1.157:/www/wwwroot/admin_dashboard/
    - ssh -o StrictHostKeyChecking=no root@192.168.1.157 "
        cd /www/wwwroot/admin_dashboard && 
        npm install && 
        npm run build && 
        pm2 startOrReload ecosystem.config.js --update-env && 
        pm2 flush Admin &&
        echo 'Aplikasi berhasil di-build dan di-reload!'
      "
  only:
    - main